<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>System Recovery Console</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="panel">
      <h1>RECOVERY CONSOLE</h1>
      <p class="sub">Emergency route. This page remains available during outage state.</p>
      <p class="warn">Required order: Restart Server, then Reload Safety Checks.</p>

      <div class="controls">
        <button id="restart-btn" type="button">Restart Server</button>
        <button id="reload-btn" type="button">Reload Safety Checks</button>
      </div>

      <p id="status" class="status" aria-live="polite"></p>
    </main>

    <script src="script.js"></script>
    <script src="../../metapuzzle-status.js"></script>
  </body>
</html>
